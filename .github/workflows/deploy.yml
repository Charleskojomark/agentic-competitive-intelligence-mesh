name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run PyTest
        run: |
          pytest tests/ -v

  build-and-deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Ingestion Agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/ingestion-agent/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/ingestion-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Analysis Agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/analysis-agent/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/analysis-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Reporting Agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/reporting-agent/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/reporting-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Alert Agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/alert-agent/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/alert-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/multi-agent-system
            docker compose pull
            docker compose up -d
